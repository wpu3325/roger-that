<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8A2B"/>
      <stop offset="1" stop-color="#F5432B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- mesh links -->
  <g stroke="#FFF7EE" stroke-width="26" stroke-linecap="round" opacity="0.85">
    <line x1="512" y1="512" x2="300" y2="320"/>
    <line x1="512" y1="512" x2="724" y2="320"/>
    <line x1="512" y1="512" x2="300" y2="704"/>
    <line x1="512" y1="512" x2="724" y2="704"/>
    <line x1="512" y1="512" x2="512" y2="240"/>
    <line x1="300" y1="320" x2="724" y2="320"/>
    <line x1="300" y1="704" x2="724" y2="704"/>
    <line x1="300" y1="320" x2="300" y2="704"/>
    <line x1="724" y1="320" x2="724" y2="704"/>
  </g>

  <!-- outer nodes -->
  <g fill="#FFF7EE">
    <circle cx="300" cy="320" r="56"/>
    <circle cx="724" cy="320" r="56"/>
    <circle cx="300" cy="704" r="56"/>
    <circle cx="724" cy="704" r="56"/>
    <circle cx="512" cy="240" r="56"/>
  </g>

  <!-- center node (highlighted) -->
  <circle cx="512" cy="512" r="96" fill="#FFF7EE"/>
  <circle cx="512" cy="512" r="46" fill="#F5432B"/>
</svg>
