name: RogerThat

options:
  bundleIdPrefix: com.wilsonpu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES

packages:
  RogerThatCore:
    path: .

targets:
  RogerThat:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/RogerThat
        excludes:
          - Resources/Info.plist
          - Resources/RogerThat.entitlements
    info:
      path: App/RogerThat/Resources/Info.plist
      properties:
        # Privacy usage strings — required; app crashes on iOS without these
        NSCameraUsageDescription: "Roger That uses the camera to scan QR codes when joining a channel."
        NSMicrophoneUsageDescription: "Roger That uses the microphone to transmit your voice during push-to-talk."
        NSBluetoothAlwaysUsageDescription: "Roger That uses Bluetooth to discover and relay messages to nearby devices."
        NSLocalNetworkUsageDescription: "Roger That uses the local network to send voice and messages directly to nearby devices."

        # Bonjour services for Multipeer Connectivity
        NSBonjourServices:
          - _rogerthat-v1._tcp
          - _rogerthat-v1._udp

        # Background modes
        UIBackgroundModes:
          - audio
          - bluetooth-central
          - bluetooth-peripheral
          - voip

        UILaunchScreen: {}

        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

        # Portrait-only; declaring full screen silences the "all orientations" validation.
        UIRequiresFullScreen: true

        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    entitlements:
      path: App/RogerThat/Resources/RogerThat.entitlements

    dependencies:
      - package: RogerThatCore
        product: RogerThatCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wilsonpu.rogerthat
        DEVELOPMENT_TEAM: "TPYY95V67H"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        # Icon Composer file App/RogerThat/roger-that-icon.icon (name without extension).
        ASSETCATALOG_COMPILER_APPICON_NAME: roger-that-icon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
