name: RogerThat

# HUMAN: Replace com.YOURTEAM with your actual Apple Developer Team ID prefix,
# e.g. com.acme.rogerthat. The bundle ID must be registered in the portal with
# the Push to Talk capability enabled.

options:
  bundleIdPrefix: com.YOURTEAM  # HUMAN: change this
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES

packages:
  RogerThatCore:
    path: .

targets:
  RogerThat:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App/RogerThat
        excludes:
          - Resources/Info.plist
          - Resources/RogerThat.entitlements
    info:
      path: App/RogerThat/Resources/Info.plist
      properties:
        # Privacy usage strings — required; app crashes on iOS without these
        NSMicrophoneUsageDescription: "Roger That uses the microphone to transmit your voice during push-to-talk."
        NSBluetoothAlwaysUsageDescription: "Roger That uses Bluetooth to discover and relay messages to nearby devices."
        NSLocalNetworkUsageDescription: "Roger That uses the local network to send voice and messages directly to nearby devices."

        # Bonjour services for Multipeer Connectivity
        NSBonjourServices:
          - _rogerthat-v1._tcp
          - _rogerthat-v1._udp

        # Background modes
        UIBackgroundModes:
          - audio
          - bluetooth-central
          - bluetooth-peripheral
          - voip

        UILaunchScreen: {}

        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    entitlements:
      path: App/RogerThat/Resources/RogerThat.entitlements
      properties:
        # HUMAN: Enable "Push to Talk" capability in Xcode Signing & Capabilities
        # before running on device.  Without this, PTChannelManager calls crash.
        com.apple.developer.push-to-talk: true
        # HUMAN: Change to 'production' before App Store submission.
        aps-environment: development

    dependencies:
      - package: RogerThatCore
        product: RogerThatCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.YOURTEAM.rogerthat  # HUMAN: change this
        DEVELOPMENT_TEAM: ""                                # HUMAN: set your Team ID
        CODE_SIGN_STYLE: Manual                             # HUMAN: switch to Automatic once Team is set
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
